<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cover · Purple — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
    }
    .viewer {
      width: 1920px; height: 1080px;
      transform-origin: center center;
    }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      v.style.transform = `scale(${s})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">

  <!-- ═══════════════════════════════════════════════════════════
       SLIDE — Cover · Purple flood
       ═══════════════════════════════════════════════════════════ -->
  <div class="slide special-slide cover-purple">

    <div class="cover-purple__inner">
      <h1 class="cover-purple__title">FY26 Q2<br>Innovation Review</h1>
      <p class="cover-purple__subtitle">Dealflow, pilots, and the startups building what your teams need next.</p>
    </div>

    <div class="cover-purple__date">May 2026</div>

  </div><!-- /slide -->

</div><!-- /viewer -->
</body>
</html>
