<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Section · Big Number — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
    }
    .viewer {
      width: 1920px; height: 1080px;
      transform-origin: center center;
    }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      v.style.transform = `scale(${s})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">

  <!-- ═══════════════════════════════════════════════════════════
       SLIDE — Section divider · big number
       ═══════════════════════════════════════════════════════════ -->
  <div class="slide special-slide section-number">

    <div class="section-number__meta">
      <span class="section-number__bar"></span>
      <span class="section-number__eyebrow">Section · 02 / 06</span>
    </div>

    <div class="section-number__digit">02</div>

    <div class="section-number__body">
      <h2 class="section-number__title">Q2 Numbers</h2>
      <p class="section-number__subtitle">Dealflow, conversions, and pilot outcomes for the quarter.</p>
    </div>

  </div><!-- /slide -->

</div><!-- /viewer -->
</body>
</html>
