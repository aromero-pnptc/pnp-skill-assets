<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Metrics as Cards — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
    }
    .viewer { width: 1920px; height: 1080px; transform-origin: center center; }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      v.style.transform = `scale(${Math.min(window.innerWidth/1920, window.innerHeight/1080)})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">
  <div class="slide">
  <div class="slide__main">
    <header class="slide__header">
      <div class="slide__header-title">Innovation Review · FY26 Q2</div>
      <div class="slide__header-meta">
        <div class="slide__page-num">16 <span style="opacity:0.5">/ 42</span></div>
        <div class="slide__logos">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/pnp-logo.svg" height="18" alt="PNP" style="opacity:0.55">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/playbook-logo.svg" height="18" alt="Playbook" style="opacity:0.55">
        </div>
      </div>
    </header>
    <div class="slide__title-zone">
      <div class="slide__purple-bar"></div>
      <h1 class="slide__title">2025 by the numbers</h1>
    </div>
    <main class="slide__content">
      <div class="content-zone">
        <!-- Asymmetric 3 + 4 row layout -->
        <div class="metrics-cards-rows">
          <div class="metrics-cards-row" style="grid-template-columns:repeat(3,minmax(0,1fr))">
            <article class="pb-card metrics-cards__cell">
              <div class="metrics-cards__num">01</div>
              <div class="metrics-cards__value">847</div>
              <div class="metrics-cards__label">Startups screened</div>
            </article>
            <article class="pb-card metrics-cards__cell">
              <div class="metrics-cards__num">02</div>
              <div class="metrics-cards__value">412</div>
              <div class="metrics-cards__label">First-call meetings</div>
            </article>
            <article class="pb-card metrics-cards__cell">
              <div class="metrics-cards__num">03</div>
              <div class="metrics-cards__value">124</div>
              <div class="metrics-cards__label">Scoping sessions</div>
            </article>
          </div>
          <div class="metrics-cards-row" style="grid-template-columns:repeat(4,minmax(0,1fr))">
            <article class="pb-card metrics-cards__cell">
              <div class="metrics-cards__num">04</div>
              <div class="metrics-cards__value">62</div>
              <div class="metrics-cards__label">Pilots launched</div>
            </article>
            <article class="pb-card metrics-cards__cell">
              <div class="metrics-cards__num">05</div>
              <div class="metrics-cards__value">44</div>
              <div class="metrics-cards__label">Pilots completed</div>
            </article>
            <article class="pb-card metrics-cards__cell">
              <div class="metrics-cards__num">06</div>
              <div class="metrics-cards__value">18</div>
              <div class="metrics-cards__label">Scaled to production</div>
            </article>
            <article class="pb-card metrics-cards__cell">
              <div class="metrics-cards__num">07</div>
              <div class="metrics-cards__value">€32M</div>
              <div class="metrics-cards__label">Annualised impact</div>
            </article>
          </div>
        </div>
      </div>
    </main>
  </div><!-- /slide__main -->
  </div><!-- /slide -->
</div>
</body>
</html>
