<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Closing · Purple — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
    }
    .viewer { width: 1920px; height: 1080px; transform-origin: center center; }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      v.style.transform = `scale(${Math.min(window.innerWidth/1920, window.innerHeight/1080)})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">
  <div class="slide special-slide closing-purple">
    <div class="closing-purple__inner">
      <h1 class="closing-purple__title">Thank you.</h1>
      <p class="closing-purple__lead">Questions, next steps, or introductions — we're ready when you are.</p>
    </div>
    <footer class="closing-purple__footer">
      <div class="closing-purple__contact">
        <span class="closing-purple__contact-label">Get in touch</span>
        <strong class="closing-purple__contact-value">hello@pnptc.com</strong>
      </div>
    </footer>
  </div>
</div>
</body>
</html>
