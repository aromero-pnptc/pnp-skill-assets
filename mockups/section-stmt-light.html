<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Section · Statement Light — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; }
    .viewer { width: 1920px; height: 1080px; transform-origin: center center; }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      v.style.transform = `scale(${Math.min(window.innerWidth/1920, window.innerHeight/1080)})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">
  <div class="slide special-slide sec-stmt sec-stmt--light">
  <div class="sec-stmt__top">
    <div class="sec-stmt__bar"></div>
    <div class="sec-stmt__eyebrow">The Playbook thesis</div>
  </div>
  <div class="sec-stmt__inner">
    <p class="sec-stmt__quote">The best corporate innovation doesn't happen at the edges — it happens when the right startup meets the right problem, inside the machine.</p>
  </div>
  <div class="sec-stmt__attr">— Playbook Research, 2025</div>
</div>
</div>
</body>
</html>
