<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Section · Split — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; }
    .viewer { width: 1920px; height: 1080px; transform-origin: center center; }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      v.style.transform = `scale(${Math.min(window.innerWidth/1920, window.innerHeight/1080)})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">
  <div class="slide special-slide section-split">
  <div class="section-split__left">
    <div class="section-split__eyebrow">Part 03</div>
    <h1 class="section-split__title">The<br>Portfolio</h1>
    <p class="section-split__subtitle">A closer look at the 18 startups that moved from pilot to production this quarter.</p>
  </div>
  <div class="section-split__right">
    <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/photos/decor/abstract%20circles.jpg" alt="">
  </div>
</div>
</div>
</body>
</html>
