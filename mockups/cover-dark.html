<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cover · Dark — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
    }
    .viewer {
      width: 1920px; height: 1080px;
      transform-origin: center center;
    }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      v.style.transform = `scale(${s})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">

  <!-- ═══════════════════════════════════════════════════════════
       SLIDE — Cover · Dark hero
       ═══════════════════════════════════════════════════════════ -->
  <div class="slide special-slide cover-dark">

    <div class="cover-dark__inner">

      <div class="cover-dark__brand">
        <span style="font-size:16px;font-weight:700;color:rgba(255,255,255,0.55);letter-spacing:0.05em">PNP</span>
        <span style="font-size:16px;font-weight:700;color:rgba(255,255,255,0.55);letter-spacing:0.05em">PLAYBOOK</span>
      </div>

      <div class="cover-dark__body">
        <div class="cover-dark__bar"></div>
        <div class="cover-dark__eyebrow">Innovation Review</div>
        <h1 class="cover-dark__title">FY26 Q2</h1>
        <p class="cover-dark__subtitle">Dealflow, pilots, and the startups building what your teams need next.</p>
      </div>

      <div class="cover-dark__date">May 2026</div>

    </div>

  </div><!-- /slide -->

</div><!-- /viewer -->
</body>
</html>
