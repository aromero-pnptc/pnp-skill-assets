<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chart Line — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; }
    .viewer { width: 1920px; height: 1080px; transform-origin: center center; }
    /* Line chart legend item */
    .chart-line__legend-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 18px; font-weight: 600; color: #1d2a57;
    }
    .chart-line__legend-swatch {
      display: inline-block; width: 28px; height: 4px; border-radius: 2px;
    }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      v.style.transform = `scale(${Math.min(window.innerWidth/1920, window.innerHeight/1080)})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">
  <div class="slide">
  <div class="slide__main">
    <header class="slide__header">
      <div class="slide__header-title">Innovation Review · FY26 Q2</div>
      <div class="slide__header-meta">
        <div class="slide__page-num">24 <span style="opacity:0.5">/ 42</span></div>
        <div class="slide__logos">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/pnp-logo.svg" height="18" alt="PNP" style="opacity:0.55">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/playbook-logo.svg" height="18" alt="Playbook" style="opacity:0.55">
        </div>
      </div>
    </header>
    <div class="slide__title-zone">
      <div class="slide__purple-bar"></div>
      <h1 class="slide__title">Dealflow velocity · trailing 8 quarters</h1>
    </div>
    <main class="slide__content">
      <div class="content-zone">

        <div class="chart" style="width:100%;height:100%;position:relative;">

          <!-- Legend (absolutely positioned top-right) -->
          <div class="chart-line__legend">
            <div class="chart-line__legend-item">
              <span class="chart-line__legend-swatch" style="background:#3333CC;"></span>
              Introductions sent
            </div>
            <div class="chart-line__legend-item">
              <span class="chart-line__legend-swatch" style="background:#3e9c74;"></span>
              Pilots started
            </div>
          </div>

          <!-- SVG chart -->
          <svg viewBox="0 0 1200 520" width="100%" height="100%"
               style="display:block;overflow:visible;" aria-label="Line chart: dealflow velocity">

            <!-- ── Grid & axes ── -->
            <!-- Horizontal grid lines (y: 60 120 180 240 300 360 420) -->
            <g stroke="#e8eaf0" stroke-width="1">
              <line x1="80" y1="60"  x2="1160" y2="60"/>
              <line x1="80" y1="120" x2="1160" y2="120"/>
              <line x1="80" y1="180" x2="1160" y2="180"/>
              <line x1="80" y1="240" x2="1160" y2="240"/>
              <line x1="80" y1="300" x2="1160" y2="300"/>
              <line x1="80" y1="360" x2="1160" y2="360"/>
              <line x1="80" y1="420" x2="1160" y2="420"/>
            </g>
            <!-- Baseline -->
            <line x1="80" y1="420" x2="1160" y2="420" stroke="#c6cedc" stroke-width="1.5"/>

            <!-- Y-axis labels (scale 0–120 in steps of 20) -->
            <g font-size="16" fill="#8a93b0" text-anchor="end" font-family="inherit">
              <text x="68" y="424">0</text>
              <text x="68" y="364">20</text>
              <text x="68" y="304">40</text>
              <text x="68" y="244">60</text>
              <text x="68" y="184">80</text>
              <text x="68" y="124">100</text>
              <text x="68" y="64">120</text>
            </g>

            <!-- X-axis labels (Q3 FY24 … Q2 FY26) — 8 quarters, spaced 154px apart starting at x=157 -->
            <g font-size="16" fill="#8a93b0" text-anchor="middle" font-family="inherit">
              <text x="157"  y="448">Q3 FY24</text>
              <text x="311"  y="448">Q4 FY24</text>
              <text x="465"  y="448">Q1 FY25</text>
              <text x="619"  y="448">Q2 FY25</text>
              <text x="773"  y="448">Q3 FY25</text>
              <text x="927"  y="448">Q4 FY25</text>
              <text x="1081" y="448">Q1 FY26</text>
              <text x="1157" y="448">Q2 FY26</text>
            </g>

            <!-- ── Series 1: Introductions sent (max ~110) ── -->
            <!-- Values: 42 55 61 72 78 88 98 108 → y = 420 - (v/120*360) -->
            <!-- y values: 294 255 237 204 186 156 126 96 -->
            <polyline
              points="157,294 311,255 465,237 619,204 773,186 927,156 1081,126 1157,96"
              fill="none" stroke="#3333CC" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
            <!-- Area fill -->
            <polygon
              points="157,294 311,255 465,237 619,204 773,186 927,156 1081,126 1157,96 1157,420 157,420"
              fill="#3333CC" fill-opacity="0.07"/>
            <!-- Dots -->
            <g fill="#3333CC">
              <circle cx="157"  cy="294" r="5"/>
              <circle cx="311"  cy="255" r="5"/>
              <circle cx="465"  cy="237" r="5"/>
              <circle cx="619"  cy="204" r="5"/>
              <circle cx="773"  cy="186" r="5"/>
              <circle cx="927"  cy="156" r="5"/>
              <circle cx="1081" cy="126" r="5"/>
              <circle cx="1157" cy="96"  r="6" stroke="white" stroke-width="2.5"/>
            </g>

            <!-- ── Series 2: Pilots started (max ~34) ── -->
            <!-- Values: 8 12 16 21 24 28 30 34 → y = 420 - (v/120*360) -->
            <!-- y values: 396 384 372 357 348 336 330 318 -->
            <polyline
              points="157,396 311,384 465,372 619,357 773,348 927,336 1081,330 1157,318"
              fill="none" stroke="#3e9c74" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
            <!-- Dots -->
            <g fill="#3e9c74">
              <circle cx="157"  cy="396" r="5"/>
              <circle cx="311"  cy="384" r="5"/>
              <circle cx="465"  cy="372" r="5"/>
              <circle cx="619"  cy="357" r="5"/>
              <circle cx="773"  cy="348" r="5"/>
              <circle cx="927"  cy="336" r="5"/>
              <circle cx="1081" cy="330" r="5"/>
              <circle cx="1157" cy="318" r="6" stroke="white" stroke-width="2.5"/>
            </g>

            <!-- ── Callout: latest quarter ── -->
            <g font-family="inherit">
              <!-- Vertical dashed drop line at Q2 FY26 -->
              <line x1="1157" y1="96" x2="1157" y2="420" stroke="#3333CC" stroke-width="1" stroke-dasharray="4 4" opacity="0.4"/>
              <!-- Value labels -->
              <text x="1170" y="100" font-size="18" font-weight="700" fill="#3333CC">108</text>
              <text x="1170" y="322" font-size="18" font-weight="700" fill="#3e9c74">34</text>
            </g>

          </svg>

        </div><!-- /chart -->

      </div>
    </main>
  </div><!-- /slide__main -->
  </div><!-- /slide -->
</div>
</body>
</html>
