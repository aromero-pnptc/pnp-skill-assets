<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Contents / Index — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
    }
    .viewer {
      width: 1920px; height: 1080px;
      transform-origin: center center;
    }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      v.style.transform = `scale(${s})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">

  <!-- ═══════════════════════════════════════════════════════════
       SLIDE — Contents / Index · 2-column · no bleed
       ═══════════════════════════════════════════════════════════ -->
  <div class="slide">
  <div class="slide__main">

    <header class="slide__header">
      <div class="slide__header-title">Innovation Review · FY26 Q2</div>
      <div class="slide__header-meta">
        <div class="slide__page-num">02 <span style="opacity:0.5">/ 42</span></div>
        <div class="slide__logos">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/pnp-logo.svg" height="18" alt="PNP" style="opacity:0.55">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/playbook-logo.svg" height="18" alt="Playbook" style="opacity:0.55">
        </div>
      </div>
    </header>

    <div class="slide__title-zone">
      <div class="slide__purple-bar"></div>
      <h1 class="slide__title">What we'll cover</h1>
    </div>

    <main class="slide__content">
      <div class="content-zone">
        <div class="contents contents--2col">

          <div class="contents__row">
            <div class="contents__num">01</div>
            <div class="contents__title">FY26 context</div>
            <div class="contents__page">p. 03</div>
          </div>

          <div class="contents__row">
            <div class="contents__num">02</div>
            <div class="contents__title">Q2 numbers</div>
            <div class="contents__page">p. 08</div>
          </div>

          <div class="contents__row">
            <div class="contents__num">03</div>
            <div class="contents__title">Vertical deep-dives</div>
            <div class="contents__page">p. 14</div>
          </div>

          <div class="contents__row">
            <div class="contents__num">04</div>
            <div class="contents__title">Startups to watch</div>
            <div class="contents__page">p. 26</div>
          </div>

          <div class="contents__row">
            <div class="contents__num">05</div>
            <div class="contents__title">Pipeline &amp; forecast</div>
            <div class="contents__page">p. 34</div>
          </div>

          <div class="contents__row">
            <div class="contents__num">06</div>
            <div class="contents__title">Next steps &amp; Q3 plan</div>
            <div class="contents__page">p. 40</div>
          </div>

        </div>
      </div>
    </main>

  </div><!-- /slide__main -->
  </div><!-- /slide -->

</div><!-- /viewer -->
</body>
</html>
