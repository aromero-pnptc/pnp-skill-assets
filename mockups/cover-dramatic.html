<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cover · Dramatic — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; }
    .viewer { width: 1920px; height: 1080px; transform-origin: center center; }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      v.style.transform = `scale(${Math.min(window.innerWidth/1920, window.innerHeight/1080)})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">
  <div class="slide special-slide cover-dramatic">
  <div class="cover-dramatic__image">
    <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/photos/bg/bg-dark.png" alt="">
  </div>
  <div class="cover-dramatic__scrim"></div>
  <div class="cover-dramatic__top">
    <div class="cover-dramatic__brand">
      <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/pnp-logo.svg" height="28" alt="PNP" style="filter:brightness(0) invert(1);opacity:0.9">
      <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/playbook-logo.svg" height="24" alt="Playbook" style="filter:brightness(0) invert(1);opacity:0.9">
    </div>
    <div class="cover-dramatic__date">May 2026</div>
  </div>
  <div class="cover-dramatic__body">
    <div class="cover-dramatic__bar"></div>
    <div class="cover-dramatic__eyebrow">Innovation Review · FY26 Q2</div>
    <h1 class="cover-dramatic__title">Where the<br>future<br>is being built.</h1>
    <p class="cover-dramatic__subtitle">Forty-seven pilots. Eighteen in production. A roadmap for what comes next.</p>
  </div>
</div>
</div>
</body>
</html>
