<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Closing · Q&A Light — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; }
    .viewer { width: 1920px; height: 1080px; transform-origin: center center; }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      v.style.transform = `scale(${Math.min(window.innerWidth/1920, window.innerHeight/1080)})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">
  <div class="slide special-slide closing-qa closing-qa--light">
  <div class="closing-qa__badge" aria-hidden="true"><span>?</span></div>
  <div class="closing-qa__inner">
    <h1 class="closing-qa__title">Q&amp;A</h1>
    <p class="closing-qa__lead">Questions, pushback, or ideas — let's hear them. We'll stay as long as you need.</p>
  </div>
  <footer class="closing-qa__footer">
    <div class="closing-qa__channel">
      <div class="closing-qa__channel-label">Email</div>
      <div class="closing-qa__channel-value">hello@pnptc.com</div>
    </div>
    <div class="closing-qa__channel">
      <div class="closing-qa__channel-label">LinkedIn</div>
      <div class="closing-qa__channel-value">pnp-playbook</div>
    </div>
    <div class="closing-qa__channel">
      <div class="closing-qa__channel-label">Website</div>
      <div class="closing-qa__channel-value">playbook.pnptc.com</div>
    </div>
  </footer>
</div>
</div>
</body>
</html>
