<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Metrics 4-up — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
    }
    .viewer {
      width: 1920px; height: 1080px;
      transform-origin: center center;
    }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      v.style.transform = `scale(${s})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">

  <!-- ═══════════════════════════════════════════════════════════
       SLIDE — Metrics 4-up · no bleed
       ═══════════════════════════════════════════════════════════ -->
  <div class="slide">
  <div class="slide__main">

    <header class="slide__header">
      <div class="slide__header-title">Innovation Review · FY26 Q2</div>
      <div class="slide__header-meta">
        <div class="slide__page-num">06 <span style="opacity:0.5">/ 42</span></div>
        <div class="slide__logos">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/pnp-logo.svg" height="18" alt="PNP" style="opacity:0.55">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/playbook-logo.svg" height="18" alt="Playbook" style="opacity:0.55">
        </div>
      </div>
    </header>

    <div class="slide__title-zone">
      <div class="slide__purple-bar"></div>
      <h1 class="slide__title">2025 by the numbers</h1>
    </div>

    <main class="slide__content">
      <div class="content-zone">
        <div class="metrics">
          <div class="metrics__rule"></div>
          <div class="metrics__grid">

            <div class="metrics__cell">
              <div class="metrics__num">01</div>
              <div class="metrics__value">847</div>
              <div class="metrics__label">Startups screened</div>
              <div class="metrics__sub">Up 22% vs. last quarter</div>
            </div>

            <div class="metrics__cell">
              <div class="metrics__num">02</div>
              <div class="metrics__value">62</div>
              <div class="metrics__label">Pilots launched</div>
              <div class="metrics__sub">Across 11 corporate sponsors</div>
            </div>

            <div class="metrics__cell">
              <div class="metrics__num">03</div>
              <div class="metrics__value">18</div>
              <div class="metrics__label">Scaled to production</div>
              <div class="metrics__sub">From the 2024 cohort onward</div>
            </div>

            <div class="metrics__cell">
              <div class="metrics__num">04</div>
              <div class="metrics__value">€32M</div>
              <div class="metrics__label">Annualised impact</div>
              <div class="metrics__sub">Verified contracted revenue</div>
            </div>

          </div>
        </div>
      </div>
    </main>

  </div><!-- /slide__main -->
  </div><!-- /slide -->

</div><!-- /viewer -->
</body>
</html>
