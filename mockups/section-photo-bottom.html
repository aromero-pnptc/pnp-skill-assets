<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Section · Photo Bottom — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; }
    .viewer { width: 1920px; height: 1080px; transform-origin: center center; }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      v.style.transform = `scale(${Math.min(window.innerWidth/1920, window.innerHeight/1080)})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">
  <div class="slide special-slide sec-photo sec-photo--bottom">
  <div class="sec-photo__image">
    <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/photos/decor/abstract%20purple%20shape.jpg" alt="">
  </div>
  <div class="sec-photo__scrim"></div>
  <div class="sec-photo__inner">
    <div class="sec-photo__meta">
      <div class="sec-photo__bar"></div>
      <div class="sec-photo__eyebrow">Part 05</div>
    </div>
    <h1 class="sec-photo__title">What's<br>Next</h1>
    <p class="sec-photo__subtitle">The roadmap for H2 2026 and beyond.</p>
  </div>
</div>
</div>
</body>
</html>
