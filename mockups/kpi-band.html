<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q2 performance snapshot — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; }
    .viewer { width: 1920px; height: 1080px; transform-origin: center center; }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      v.style.transform = `scale(${Math.min(window.innerWidth/1920, window.innerHeight/1080)})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">
  <div class="slide">
  <div class="slide__main">
    <header class="slide__header">
      <div class="slide__header-title">Innovation Review · FY26 Q2</div>
      <div class="slide__header-meta">
        <div class="slide__page-num">26 <span style="opacity:0.5">/ 42</span></div>
        <div class="slide__logos">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/pnp-logo.svg" height="18" alt="PNP" style="opacity:0.55">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/playbook-logo.svg" height="18" alt="Playbook" style="opacity:0.55">
        </div>
      </div>
    </header>
    <div class="slide__title-zone">
      <div class="slide__purple-bar"></div>
      <h1 class="slide__title">Q2 performance snapshot</h1>
    </div>
    <main class="slide__content">
      <div class="content-zone">
        <div class="kpi-band" data-count="4">
  <div class="pb-card kpi-band__card">
    <div class="kpi-band__label">Startups sourced</div>
    <div class="kpi-band__value">847</div>
    <div class="kpi-band__row">
      <span class="kpi-band__delta" data-dir="up">↑ 22%</span>
      <span class="kpi-band__delta-label">vs Q1</span>
    </div>
  </div>
  <div class="pb-card kpi-band__card">
    <div class="kpi-band__label">Pilots launched</div>
    <div class="kpi-band__value">62</div>
    <div class="kpi-band__row">
      <span class="kpi-band__delta" data-dir="up">↑ 8%</span>
      <span class="kpi-band__delta-label">vs Q1</span>
    </div>
  </div>
  <div class="pb-card kpi-band__card">
    <div class="kpi-band__label">Conversion rate</div>
    <div class="kpi-band__value">38%</div>
    <div class="kpi-band__row">
      <span class="kpi-band__delta" data-dir="up">↑ 4pp</span>
      <span class="kpi-band__delta-label">vs Q1</span>
    </div>
  </div>
  <div class="pb-card kpi-band__card">
    <div class="kpi-band__label">Annualised impact</div>
    <div class="kpi-band__value">€32M</div>
    <div class="kpi-band__row">
      <span class="kpi-band__delta" data-dir="up">↑ 34%</span>
      <span class="kpi-band__delta-label">vs Q1</span>
    </div>
  </div>
</div>
      </div>
    </main>
  </div><!-- /slide__main -->
  </div><!-- /slide -->
</div>
</body>
</html>
