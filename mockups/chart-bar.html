<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chart Bar — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; }
    .viewer { width: 1920px; height: 1080px; transform-origin: center center; }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      v.style.transform = `scale(${Math.min(window.innerWidth/1920, window.innerHeight/1080)})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">
  <div class="slide">
  <div class="slide__main">
    <header class="slide__header">
      <div class="slide__header-title">Innovation Review · FY26 Q2</div>
      <div class="slide__header-meta">
        <div class="slide__page-num">25 <span style="opacity:0.5">/ 42</span></div>
        <div class="slide__logos">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/pnp-logo.svg" height="18" alt="PNP" style="opacity:0.55">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/playbook-logo.svg" height="18" alt="Playbook" style="opacity:0.55">
        </div>
      </div>
    </header>
    <div class="slide__title-zone">
      <div class="slide__purple-bar"></div>
      <h1 class="slide__title">Introductions by business unit · FY26</h1>
    </div>
    <main class="slide__content">
      <div class="content-zone">

        <div class="chart" style="width:100%;height:100%;position:relative;">
          <svg viewBox="0 0 1200 500" width="100%" height="100%"
               style="display:block;overflow:visible;" aria-label="Bar chart: introductions by BU">

            <!-- ── Grid ── -->
            <g stroke="#e8eaf0" stroke-width="1">
              <line x1="80" y1="40"  x2="1160" y2="40"/>
              <line x1="80" y1="110" x2="1160" y2="110"/>
              <line x1="80" y1="180" x2="1160" y2="180"/>
              <line x1="80" y1="250" x2="1160" y2="250"/>
              <line x1="80" y1="320" x2="1160" y2="320"/>
              <line x1="80" y1="390" x2="1160" y2="390"/>
            </g>
            <!-- Baseline -->
            <line x1="80" y1="390" x2="1160" y2="390" stroke="#c6cedc" stroke-width="1.5"/>

            <!-- Y-axis labels (0–100 in steps of 20) -->
            <g font-size="16" fill="#8a93b0" text-anchor="end" font-family="inherit">
              <text x="68" y="394">0</text>
              <text x="68" y="324">20</text>
              <text x="68" y="254">40</text>
              <text x="68" y="184">60</text>
              <text x="68" y="114">80</text>
              <text x="68" y="44">100</text>
            </g>

            <!--
              7 BUs. Chart area: x 80–1160 = 1080px.
              Group width = 1080/7 = ~154px.
              Bar width = 80px, centered in group.
              Group centers: 80 + 77 + n*154 → 157, 311, 465, 619, 773, 927, 1081
              Bar left = center - 40.
              Values (out of 100, scale 0–100 → 0–350px height):
              Supply Chain: 88 → h=308, y=82
              Mobility: 73 → h=256, y=134
              Energy: 65 → h=228, y=162
              Smart City: 57 → h=200, y=190
              Fintech: 49 → h=172, y=218
              Health: 42 → h=147, y=243
              Media: 31 → h=109, y=281
            -->

            <!-- Bars -->
            <!-- Supply Chain 88 → highlighted (purple) -->
            <rect x="117" y="82"  width="80" height="308" fill="#3333CC" rx="6"/>
            <!-- Mobility 73 -->
            <rect x="271" y="134" width="80" height="256" fill="#5a5ecc" rx="6"/>
            <!-- Energy 65 -->
            <rect x="425" y="162" width="80" height="228" fill="#7a7edc" rx="6"/>
            <!-- Smart City 57 -->
            <rect x="579" y="190" width="80" height="200" fill="#9aa5e6" rx="6"/>
            <!-- Fintech 49 -->
            <rect x="733" y="218" width="80" height="172" fill="#b0baee" rx="6"/>
            <!-- Health 42 -->
            <rect x="887" y="243" width="80" height="147" fill="#c8d2f8" rx="6"/>
            <!-- Media 31 -->
            <rect x="1041" y="281" width="80" height="109" fill="#d8dff8" rx="6"/>

            <!-- Value labels above bars -->
            <g font-size="17" font-weight="700" text-anchor="middle" font-family="inherit">
              <text x="157"  y="72"  fill="#3333CC">88</text>
              <text x="311"  y="124" fill="#5a5ecc">73</text>
              <text x="465"  y="152" fill="#7a7edc">65</text>
              <text x="619"  y="180" fill="#9aa5e6">57</text>
              <text x="773"  y="208" fill="#b0baee">49</text>
              <text x="927"  y="233" fill="#b0baee">42</text>
              <text x="1081" y="271" fill="#b0baee">31</text>
            </g>

            <!-- X-axis labels -->
            <g font-size="16" fill="#8a93b0" text-anchor="middle" font-family="inherit">
              <text x="157"  y="416">Supply Chain</text>
              <text x="311"  y="416">Mobility</text>
              <text x="465"  y="416">Energy</text>
              <text x="619"  y="416">Smart City</text>
              <text x="773"  y="416">Fintech</text>
              <text x="927"  y="416">Health</text>
              <text x="1081" y="416">Media</text>
            </g>

          </svg>
        </div><!-- /chart -->

      </div>
    </main>
  </div><!-- /slide__main -->
  </div><!-- /slide -->
</div>
</body>
</html>
