<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hero Metric — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
    }
    .viewer {
      width: 1920px; height: 1080px;
      transform-origin: center center;
    }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      v.style.transform = `scale(${s})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">

  <!-- ═══════════════════════════════════════════════════════════
       SLIDE — Hero metric · no bleed
       ═══════════════════════════════════════════════════════════ -->
  <div class="slide">
  <div class="slide__main">

    <header class="slide__header">
      <div class="slide__header-title">Innovation Review · FY26 Q2</div>
      <div class="slide__header-meta">
        <div class="slide__page-num">07 <span style="opacity:0.5">/ 42</span></div>
        <div class="slide__logos">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/pnp-logo.svg" height="18" alt="PNP" style="opacity:0.55">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/playbook-logo.svg" height="18" alt="Playbook" style="opacity:0.55">
        </div>
      </div>
    </header>

    <div class="slide__title-zone">
      <div class="slide__purple-bar"></div>
      <h1 class="slide__title">One number that matters</h1>
    </div>

    <main class="slide__content">
      <div class="content-zone">
        <div class="hero-metric">
          <div class="pb-eyebrow">Contracted revenue impact, FY26 YTD</div>
          <div class="hero-metric__value">€32M</div>
          <div class="hero-metric__label">from pilots that scaled into production</div>
          <p class="pb-body">Across 18 production engagements with 11 corporate sponsors. The next €18M is already under signed letter-of-intent for Q3 and Q4.</p>
        </div>
      </div>
    </main>

  </div><!-- /slide__main -->
  </div><!-- /slide -->

</div><!-- /viewer -->
</body>
</html>
