<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cover · Feather Light — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #2a2a2a; display: flex; align-items: center; justify-content: center; }
    .viewer { width: 1920px; height: 1080px; transform-origin: center center; }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      v.style.transform = `scale(${Math.min(window.innerWidth/1920, window.innerHeight/1080)})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">
  <div class="slide special-slide cover-feather cover-feather--light">
  <div class="cover-feather__image">
    <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/photos/decor/abstract%20curves%20blue.jpg" alt="">
  </div>
  <div class="cover-feather__inner">
    <div class="cover-feather__brand">
      <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/pnp-logo.svg" height="28" alt="PNP" style="opacity:0.8">
      <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/playbook-logo.svg" height="24" alt="Playbook" style="opacity:0.8">
    </div>
    <div class="cover-feather__body">
      <div class="cover-feather__bar"></div>
      <h1 class="cover-feather__title">Innovation<br>Review<br>FY26 Q2</h1>
      <p class="cover-feather__subtitle">Forty-seven pilots. Eighteen in production. A roadmap for what comes next.</p>
    </div>
    <div class="cover-feather__date">May 2026</div>
  </div>
</div>
</div>
</body>
</html>
