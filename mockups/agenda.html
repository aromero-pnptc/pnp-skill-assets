<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agenda — Playbook mockup</title>
  <link rel="stylesheet" href="playbook.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #2a2a2a;
      display: flex; align-items: center; justify-content: center;
    }
    .viewer {
      width: 1920px; height: 1080px;
      transform-origin: center center;
    }
  </style>
  <script>
    function scale() {
      const v = document.querySelector('.viewer');
      const s = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
      v.style.transform = `scale(${s})`;
    }
    window.addEventListener('load', scale);
    window.addEventListener('resize', scale);
  </script>
</head>
<body>
<div class="viewer">

  <!-- ═══════════════════════════════════════════════════════════
       SLIDE — Agenda · no bleed
       ═══════════════════════════════════════════════════════════ -->
  <div class="slide">
  <div class="slide__main">

    <header class="slide__header">
      <div class="slide__header-title">Innovation Review · FY26 Q2</div>
      <div class="slide__header-meta">
        <div class="slide__page-num">12 <span style="opacity:0.5">/ 42</span></div>
        <div class="slide__logos">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/pnp-logo.svg" height="18" alt="PNP" style="opacity:0.55">
          <img src="https://cdn.jsdelivr.net/gh/aromero-pnptc/pnp-skill-assets@main/logos/playbook-logo.svg" height="18" alt="Playbook" style="opacity:0.55">
        </div>
      </div>
    </header>

    <div class="slide__title-zone">
      <div class="slide__purple-bar"></div>
      <h1 class="slide__title">Today's agenda</h1>
    </div>

    <main class="slide__content">
      <div class="content-zone">
        <div class="agenda">

          <div class="agenda__row">
            <div class="agenda__time">09:00</div>
            <div class="agenda__title">Welcome &amp; FY26 context</div>
            <div class="agenda__duration">20 min</div>
          </div>

          <div class="agenda__row">
            <div class="agenda__time">09:20</div>
            <div class="agenda__title">Q2 numbers walk-through</div>
            <div class="agenda__duration">30 min</div>
          </div>

          <div class="agenda__row">
            <div class="agenda__time">09:50</div>
            <div class="agenda__title">Vertical deep-dive: ClimateTech</div>
            <div class="agenda__duration">40 min</div>
          </div>

          <div class="agenda__row">
            <div class="agenda__time">10:30</div>
            <div class="agenda__title">Three startups to watch</div>
            <div class="agenda__duration">30 min</div>
          </div>

          <div class="agenda__row">
            <div class="agenda__time">11:00</div>
            <div class="agenda__title">Pipeline &amp; Q3 plan</div>
            <div class="agenda__duration">20 min</div>
          </div>

        </div>
      </div>
    </main>

  </div><!-- /slide__main -->
  </div><!-- /slide -->

</div><!-- /viewer -->
</body>
</html>
